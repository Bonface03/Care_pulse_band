# render.yaml
services:
  - type: web
    name: carepulse-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carepulse-db
          property: connectionString

databases:
  - name: carepulse-db
    databaseName: carepulse
    user: carepulse_user
    plan: free
