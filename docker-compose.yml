version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: carepulse_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: carepulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: carepulse_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
